# @Date: 2026-05-30
# @Author: xisy
# @Discription: EduWeave 前端 nginx 站点配置：SPA 路由回退 + /api 反向代理到后端内网（含 SSE 流式）

server {
    # 与 Dockerfile 中 EXPOSE 一致，Zeabur Dockerfile 部署默认端口 8080
    listen 8080;
    server_name _;

    # 放宽上传体积，适配教材 / 学情等大文件上传
    client_max_body_size 100m;

    root /usr/share/nginx/html;
    index index.html;

    # 单页应用：未命中静态资源时回退到 index.html，交给前端路由处理
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 反向代理后端 API。backend 为同一 Zeabur 项目内的后端服务名，
    # 端口取后端服务声明的 8080；路径以 /api/ 开头，原样透传到后端的 /api/v1。
    location /api/ {
        proxy_pass http://backend.zeabur.internal:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 流式接口（agent 运行时间线、教案与课件流式生成）：
        # 关闭缓冲并放宽读超时，确保增量内容实时下发到浏览器。
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }
}
